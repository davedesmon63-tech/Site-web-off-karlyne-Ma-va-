<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Web Off Karlyne Maëva 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0; padding:0; box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif; background:#FFF0F3; color:#2D2D2D;}
    
    .hero{
      height:100vh;
      position:relative;
      display:flex; align-items:center; justify-content:center; text-align:center; flex-direction:column;
      overflow:hidden;
    }
    .hero video{
      position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2;
    }
    .overlay{
      position:absolute; top:0; left:0; width:100%; height:100%; 
      background: linear-gradient(rgba(255,194,209,0.6), rgba(0,0,0,0.4)); z-index:-1;
    }
    
    .photo{
      width:170px; height:170px; border-radius:50%; 
      border:4px solid #FFC2D1; object-fit:cover; margin-bottom:25px;
      box-shadow:0 8px 25px rgba(0,0,0,0.3);
    }
    
    h1{
      font-family:'Playfair Display',serif; font-size:3rem; color:white; 
      letter-spacing:2px; text-transform:uppercase;
    }
    h2{
      font-size:1.6rem; color:white; font-weight:300; margin:8px 0 30px;
    }
    .btn{
      background:#FFC2D1; color:#2D2D2D; padding:14px 32px; border-radius:50px; 
      text-decoration:none; font-weight:600; transition:0.3s; font-size:1rem;
    }
    .btn:hover{background:#E5989B; transform:scale(1.05);}
    
    .section{padding:70px 20px; text-align:center;}
    .section h3{font-family:'Playfair Display',serif; color:#E5989B; font-size:2rem; margin-bottom:15px;}
  </style>
</head>
<body>

  <section class="hero">
    <video autoplay muted loop playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <img src="photo-karlyne.jpg" alt="Karlyne Maëva" class="photo">
    
    <h1>Site Web Off</h1>
    <h2>Karlyne Maëva ♡</h2>
    <a href="#msg" class="btn">Entrer dans mon univers</a>
  </section>

  <section id="msg" class="section">
    <h3>Bienvenue</h3>
    <p>Ce site a été fait rien que pour toi Karlyne Maëva ✨<br>
    Avec tout mon amour.</p>
  </section>

</body>
</html>
